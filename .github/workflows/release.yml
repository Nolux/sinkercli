name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux binary
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install libpulse
        run: sudo apt-get install -y libpulse-dev

      - name: Build
        run: cargo build --release --locked

      - name: Package
        run: |
          cp target/release/sinkercli sinkercli
          tar czf sinkercli-x86_64-unknown-linux-gnu.tar.gz sinkercli
          sha256sum sinkercli-x86_64-unknown-linux-gnu.tar.gz \
            | awk '{print $1}' > sinkercli-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sinkercli-x86_64-unknown-linux-gnu.tar.gz
            sinkercli-x86_64-unknown-linux-gnu.tar.gz.sha256
